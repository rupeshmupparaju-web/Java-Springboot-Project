<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .forgot-container {
            width: 360px;
            background: #ceceef;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        }

        .forgot-container h2 {
            margin: 0 0 10px 0;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 14px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 11px;
            background: #0056cc;
            border: none;
            color: #9b5555;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #004199;
        }

        .secondary-button {
            width: 100%;
            padding: 11px;
            margin-top: 10px;
            background: #6c757d;
            border: none;
            color: #ffffff;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            display: block;
            text-decoration: none;
        }

        .secondary-button:hover {
            background: #5a6268;
        }

        #resetMessage {
            margin-top: 16px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="forgot-container">
        <h2>Forgot Password</h2>
        <p class="subtitle">Please enter your email to reset your password.</p>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="resetEmail">Email Address</label>
                <input type="email" id="resetEmail" placeholder="Gmail" required>
            </div>

            <button type="submit">Send Reset Link</button>
        </form>

        <div id="resetMessage"></div>

        <a href="/login.html" class="secondary-button" style="color: white;">Back to Login</a>
    </div>

    <script>
        document.getElementById("forgotPasswordForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("resetEmail").value.trim();
            const messageDiv = document.getElementById("resetMessage");
            messageDiv.innerText = "";
            messageDiv.style.color = "";

            try {
                const response = await fetch("/api/forgot-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ gmail: email })
                });

                const contentType = response.headers.get("content-type");
                let result = "";
                
                if (contentType && contentType.includes("application/json")) {
                    const jsonResult = await response.json();
                    result = jsonResult.message || jsonResult.error || "An error occurred";
                } else {
                    result = await response.text();
                }

                messageDiv.innerText = result;

                if (response.ok) {
                    messageDiv.style.color = "green";
                } else {
                    messageDiv.style.color = "red";
                }
            } catch (error) {
                console.error("Forgot password error:", error);
                messageDiv.innerText = "Error connecting to backend";
                messageDiv.style.color = "red";
            }
        });
    </script>
</body>

</html>
