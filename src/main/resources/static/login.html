<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 360px;
            background: #ceceef;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        }

        .login-container h2 {
            margin: 0 0 20px 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 11px;
            background: #0056cc;
            border: none;
            color: #9b5555;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #004199;
        }

        .secondary-button {
            width: 100%;
            padding: 11px;
            margin-top: 10px;
            background: #6c757d;
            border: none;
            color: #ffffff;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .secondary-button:hover {
            background: #5a6268;
        }

        #message {
            margin-top: 16px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: blue;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Login</h2>

    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>

    <button onclick="loginUser()">Login</button>
    <a href="/forgot-password.html" class="forgot-link" style="color: blue;">Forgot Password?</a>
    <button class="secondary-button" onclick="createAccount()">Create New Account</button>

    <div id="message"></div>
</div>

<script>
    async function loginUser() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const messageDiv = document.getElementById("message");

        if (!username || !password) {
            messageDiv.textContent = "Please enter username and password";
            messageDiv.className = "error";
            return;
        }

        try {
            const response = await fetch("/api/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            const result = await response.text();

            messageDiv.textContent = result;
            if (response.ok) {
                messageDiv.className = "success";
                setTimeout(() => {
                    window.location.href = "/ai-block.html";
                }, 1000);
            } else {
                messageDiv.className = "error";
            }
        } catch (error) {
            console.error("Login error:", error);
            messageDiv.textContent = "Error connecting to backend";
            messageDiv.className = "error";
        }
    }

    function createAccount() {
        globalThis.location.href = "/register.html";
    }
</script>
</body>
</html>
