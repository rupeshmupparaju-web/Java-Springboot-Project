<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container {
            width: 400px;
            background: #ceceef;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
            max-height: 90vh;
            overflow-y: auto;
        }

        .register-container h2 {
            margin: 0 0 20px 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 11px;
            background: #0056cc;
            border: none;
            color: #9b5555;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #004199;
        }

        .secondary-button {
            width: 100%;
            padding: 11px;
            margin-top: 10px;
            background: #6c757d;
            border: none;
            color: #ffffff;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            display: block;
            text-decoration: none;
        }

        .secondary-button:hover {
            background: #5a6268;
        }

        #message {
            margin-top: 16px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: blue;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Create Account</h2>

        <form id="registerForm">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="First Name" required>
            </div>
            
            <div class="form-group">
                <label for="middleName">Middle Name</label>
                <input type="text" id="middleName" placeholder="Middle Name">
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Last Name" required>
            </div>

            <div class="form-group">
                <label for="mobileNumber">Mobile Number</label>
                <input type="text" id="mobileNumber" placeholder="Mobile Number" required>
            </div>

            <div class="form-group">
                <label for="gmail">Gmail</label>
                <input type="email" id="gmail" placeholder="Gmail" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <button type="submit">Register</button>
        </form>

        <a href="/login.html" class="secondary-button" style="color: white;">Back to Login</a>

        <div id="message"></div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const messageDiv = document.getElementById("message");
            const data = {
                firstName: document.getElementById("firstName").value,
                middleName: document.getElementById("middleName").value,
                lastName: document.getElementById("lastName").value,
                mobileNumber: document.getElementById("mobileNumber").value,
                gmail: document.getElementById("gmail").value,
                username: document.getElementById("username").value,
                password: document.getElementById("password").value,
                confirmPassword: document.getElementById("confirmPassword").value
            };

            try {
                const response = await fetch("/api/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.text();
                messageDiv.innerText = result;

                if (response.ok) {
                    messageDiv.className = "success";
                } else {
                    messageDiv.className = "error";
                }
            } catch (error) {
                console.error("Register error:", error);
                messageDiv.textContent = "Error connecting to backend";
                messageDiv.className = "error";
            }
        });
    </script>
</body>
</html>
